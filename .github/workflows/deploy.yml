name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS using SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Jika Anda menggunakan custom port untuk SSH (default 22), bisa ditambahkan:
          # port: 22
          script: |
            # Berhenti otomatis jika ada SATUPUN sintaks yang error
            set -e
            
            # Pindah ke direktori project Anda di instance VPS (diambil dari Github Secrets WORK_DIR)
            cd ${{ secrets.WORK_DIR }}
            
            echo "Menambahkan direktori ke git safe.directory untuk menghindari error ownership..."
            git config --global --add safe.directory ${{ secrets.WORK_DIR }}
            
            echo "Menarik kode terbaru dari Github (main branch)...."
            git fetch origin
            git reset --hard origin/main
            
            echo "Menginstall dependensi PHP Mode Production..."
            
            # Pemeriksaan krusial: Pastikan engine Laravel terpasang
            if [ ! -f "vendor/autoload.php" ]; then
              echo "Error: File vendor/autoload.php tidak ditemukan! Instalasi Composer gagal fatal."
              exit 1
            fi
            
            echo "Menginstall library Node.js & Mem-build React Vite..."
            npm ci
            npm run build
            
            echo "Menjalankan Migrasi Database..."
            php artisan migrate --force
            
            echo "Mereset Cache Aplikasi..."
            php artisan route:clear || echo 'no routes'
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            echo "Mereset Service Queue & Reverb..."
            # Laravel otomatis mematikan listener saat ini agar process manager (Supervisor/systemd) merestartnya.
            php artisan queue:restart || true
            php artisan reverb:restart || true
            
            echo "🚀 DEPLOYMENT BERHASIL! APLIKASI TELAH DIPERBARUI."
